<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spenderportal - Tieradoption</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="text-center mb-4">Unterstützen Sie uns</h2>
                    
                    <form id="donationForm" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="amount" class="form-label">Spendenbetrag (€)</label>
                            <input type="number" class="form-control" id="amount" min="0.01" step="0.01" required>
                            <div class="invalid-feedback">Bitte geben Sie einen Betrag größer als 0 ein.</div>
                        </div>

                        <div class="mb-3">
                            <label for="donorName" class="form-label">Vollständiger Name</label>
                            <input type="text" class="form-control" id="donorName" required>
                            <div class="invalid-feedback">Name ist erforderlich.</div>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Jetzt Spenden</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="validierung.js"></script>
</body>
</html>
